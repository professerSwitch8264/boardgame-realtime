<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Who R U - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        
        <div id="lobby" class="card">
            <h2 class="card-main-title">🏰 LOBBY</h2>
            
            <div class="form-group">
                <label for="username">👤 ตั้งชื่อเล่นของคุณ</label>
                <input type="text" id="username" class="styled-input" placeholder="เช่น Punchy" maxlength="12">
            </div>
            
            <div class="avatar-selection">
                <h4>🎭 เลือกตัวละคร</h4>
                <div class="avatar-wrapper">
                    <button class="nav-btn" id="prevAv">❮</button>
                    <div id="avatarList" class="avatar-scroll-container"></div>
                    <button class="nav-btn" id="nextAv">❯</button>
                </div>
            </div>

            <div class="separator"></div>
            
            <div class="lobby-header-row">
                <h4>🏘️ รายชื่อห้อง</h4>
                <button id="btnCreate" class="btn-primary-sm">🎮 สร้างห้องใหม่</button>
            </div>

            <div class="search-area">
                <input type="text" id="searchRoomInput" class="styled-input" placeholder="🔍 ค้นหาตามชื่อห้อง (6 หลัก)..." maxlength="6">
            </div>
            
            <div id="roomListArea" class="room-list-scroll"></div>
        </div>

        <div id="gameRoom" class="card game-area" style="display:none;">
            <h2 class="card-main-title">⚙️ ROOM SETUP</h2>

            <div class="room-info">
                <span id="roomIdText" class="badge-id">ID: ------</span>
                <span class="player-count">👥 <span id="playerCountLabel">0</span>/10</span>
            </div>

            <div id="playerList" class="list-layout"></div>

            <div class="bottom-section">
                <div class="chat-input-group">
                    <input type="text" id="chatInput" placeholder="คุยกับเพื่อน..." maxlength="30">
                    <button id="btnSend" class="btn-send-icon">🚀</button>
                </div>

                <div class="action-group">
                    <button id="btnStart" class="btn-start-game" style="display: none;">🔥 เริ่มเกมเลย!</button>
                    <button id="btnLeave" class="btn-muted">ออกจากห้อง</button>
                </div>
            </div>
        </div>

    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
